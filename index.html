<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Stuffy Frights</title>
    <!-- Installed to the home screen, launch chromeless + landscape. -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#05060a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>%F0%9F%A7%B8</text></svg>"
    />
    <style>
      /* Bundled OFL/Apache fonts (public/fonts/, served under the Vite base).
         Relative URLs so they resolve under /stuffy-frights/ in dev + build. */
      @font-face {
        font-family: 'Creepster';
        src: url('fonts/title.woff2') format('woff2');
        font-display: swap;
      }
      @font-face {
        font-family: 'Patrick Hand';
        src: url('fonts/easy.woff2') format('woff2');
        font-display: swap;
      }
      @font-face {
        font-family: 'Special Elite';
        src: url('fonts/medium.woff2') format('woff2');
        font-display: swap;
      }
      @font-face {
        font-family: 'Eater';
        src: url('fonts/hard.woff2') format('woff2');
        font-display: swap;
      }
      @font-face {
        font-family: 'Nosifer';
        src: url('fonts/nightmare.woff2') format('woff2');
        font-display: swap;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Trebuchet MS', Verdana, sans-serif;
      }
      #game {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }
      #ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        user-select: none;
      }
      #ui .clickable {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
